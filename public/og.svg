<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#161210"/>
  <!-- Grain texture hint -->
  <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter>
  <rect width="1200" height="630" filter="url(#n)" opacity="0.03"/>
  <!-- Brand mark -->
  <text x="80" y="120" fill="#7a7068" font-family="system-ui, sans-serif" font-size="24" font-weight="500" letter-spacing="0.02em">eidos agi</text>
  <!-- Headline -->
  <text x="80" y="280" fill="#dcd5cb" font-family="system-ui, sans-serif" font-size="72" font-weight="700" letter-spacing="-0.03em">Software for agents.</text>
  <text x="80" y="370" fill="#c4935a" font-family="system-ui, sans-serif" font-size="72" font-weight="700" letter-spacing="-0.03em">Governance for reality.</text>
  <!-- Subline -->
  <text x="80" y="440" fill="#7a7068" font-family="system-ui, sans-serif" font-size="24" font-weight="400">9 packages on PyPI. All open source. All MIT.</text>
  <!-- Rule -->
  <rect x="80" y="230" width="64" height="3" fill="#c4935a" rx="1"/>
  <!-- URL -->
  <text x="80" y="570" fill="#7a7068" font-family="monospace" font-size="18">eidosagi.com</text>
</svg>
